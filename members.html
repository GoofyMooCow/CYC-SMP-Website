<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CYC SMP — Members</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="images/favicon.png">
  <script defer src="assets/script.js"></script>
  <style>
    /* Let Tailwind animate max-height */
    .transition-max-height {
      transition: max-height 0.3s ease;
    }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <header class="bg-gray-800 backdrop-blur sticky top-0 z-30">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <h1 class="text-2xl font-semibold tracking-wide">CYC SMP</h1>

      <!-- Hamburger button -->
      <button id="menu-btn" class="md:hidden text-gray-200 text-3xl focus:outline-none">
        ☰
      </button>

      <!-- Desktop Nav -->
      <nav class="hidden md:flex space-x-6">
        <a class="hover:text-sky-400" href="index.html">Home</a>
        <a class="hover:text-sky-400" href="news.html">News</a>
        <a class="hover:text-sky-400 text-sky-400" href="members.html">Members</a>
        <a class="hover:text-sky-400" href="gallery.html">Gallery</a>
        <a class="hover:text-sky-400" href="downloads.html">Downloads</a>
      </nav>
    </div>

    <!-- Mobile Dropdown Panel -->
    <div id="mobile-menu"
         class="max-h-0 overflow-hidden md:hidden bg-gray-800 border-t border-gray-700 transition-max-height duration-300">
      <nav class="px-4 py-3 space-y-3 text-lg">
        <a class="block hover:text-sky-400" href="index.html">Home</a>
        <a class="block hover:text-sky-400" href="news.html">News</a>
        <a class="block hover:text-sky-400 text-sky-400" href="members.html">Members</a>
        <a class="block hover:text-sky-400" href="gallery.html">Gallery</a>
        <a class="block hover:text-sky-400" href="downloads.html">Downloads</a>
      </nav>
    </div>
  </header>

  <main class="max-w-6xl mx-auto p-6 pb-16">
    <div id="members-container" class="grid gap-4 grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6"></div>
  </main>

  <footer class="px-2 mt-8 fixed bottom-0 w-full bg-gray-800 backdrop-blur py-0 h-14 text-center text-sm text-gray-400 flex items-center justify-between space-x-4">
    <img src="images/favicon.png" alt="CYC SMP Logo" class="inline-block w-10 h-10" />

    © 2026 CYC SMP

    <div>
      <!-- Discord -->
      <a href="https://discord.gg/DGXFjRkVg7" target="_blank" aria-label="Discord Server"
         class="inline-block mx-2 relative w-6 h-6 group">
        <img src="images/Discord-white.svg" alt="Discord"
             class="absolute inset-0 w-full h-full transition-opacity duration-300 opacity-100 group-hover:opacity-0" />
        <img src="images/Discord.svg" alt="Discord"
             class="absolute inset-0 w-full h-full transition-opacity duration-300 opacity-0 group-hover:opacity-100" />
      </a>

      <!-- YouTube -->
      <a href="https://www.youtube.com/@CYC-SMP" target="_blank" aria-label="YouTube Channel"
         class="inline-block mx-2 relative w-6 h-6 group">
        <img src="images/Youtube-white.svg" alt="YouTube"
             class="absolute inset-0 w-full h-full transition-opacity duration-300 opacity-100 group-hover:opacity-0" />
        <img src="images/Youtube.svg" alt="YouTube"
             class="absolute inset-0 w-full h-full transition-opacity duration-300 opacity-0 group-hover:opacity-100" />
      </a>
    </div>
  </footer>
</body>
</html>
